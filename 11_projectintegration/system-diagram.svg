<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220"
     viewBox="0 0 720 220" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="720" height="220" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="bold">
    Integration Week — System Architecture
  </text>

  <!-- ── Node 1: NEMA 17 ── -->
  <rect x="20" y="50" width="110" height="60" rx="8" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="75" y="75" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">NEMA 17</text>
  <text x="75" y="90" text-anchor="middle" fill="#86efac" font-size="8">Stepper motor</text>
  <text x="75" y="103" text-anchor="middle" fill="#86efac" font-size="8">feeds pages</text>

  <!-- ── Node 2: ESP32 + DRV8825 ── -->
  <rect x="168" y="50" width="120" height="60" rx="8" fill="#1e3a1e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="228" y="72" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">ESP32</text>
  <text x="228" y="85" text-anchor="middle" fill="#86efac" font-size="8">+ DRV8825 driver</text>
  <text x="228" y="98" text-anchor="middle" fill="#86efac" font-size="8">STEP/DIR pulses</text>
  <text x="228" y="108" text-anchor="middle" fill="#60a5fa" font-size="7">HTTP /turn endpoint</text>

  <!-- Arrow: ESP32 → NEMA -->
  <line x1="168" y1="80" x2="130" y2="80" stroke="#4ade80" stroke-width="2"/>
  <polygon points="130,75 118,80 130,85" fill="#4ade80"/>
  <text x="149" y="73" text-anchor="middle" fill="#86efac" font-size="7">GPIO</text>
  <text x="149" y="83" text-anchor="middle" fill="#86efac" font-size="7">32/26</text>

  <!-- ── Node 3: XIAO ESP32-S3 Cam ── -->
  <rect x="330" y="50" width="120" height="60" rx="8" fill="#0c1a35" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="390" y="70" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="bold">XIAO ESP32-S3</text>
  <text x="390" y="83" text-anchor="middle" fill="#93c5fd" font-size="8">OV2640 camera</text>
  <text x="390" y="96" text-anchor="middle" fill="#93c5fd" font-size="8">2048×1536 JPEG</text>
  <text x="390" y="108" text-anchor="middle" fill="#60a5fa" font-size="7">POST /frame over WiFi</text>

  <!-- Arrow: Cam → Laptop -->
  <line x1="450" y1="80" x2="490" y2="80" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="490,75 502,80 490,85" fill="#38bdf8"/>
  <text x="471" y="73" text-anchor="middle" fill="#93c5fd" font-size="7">WiFi</text>
  <text x="471" y="83" text-anchor="middle" fill="#93c5fd" font-size="7">JPEG</text>

  <!-- Arrow: ESP32 → Cam trigger (optional) -->
  <line x1="288" y1="80" x2="330" y2="80" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="309" y="73" text-anchor="middle" fill="#64748b" font-size="7">trigger</text>

  <!-- ── Node 4: Laptop server ── -->
  <rect x="502" y="50" width="100" height="60" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="552" y="70" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">Laptop</text>
  <text x="552" y="83" text-anchor="middle" fill="#fdba74" font-size="8">Python server</text>
  <text x="552" y="96" text-anchor="middle" fill="#fdba74" font-size="8">receives frames</text>
  <text x="552" y="108" text-anchor="middle" fill="#fdba74" font-size="8">calls Claude API</text>

  <!-- Arrow: Laptop → Claude -->
  <line x1="602" y1="80" x2="638" y2="80" stroke="#f97316" stroke-width="2"/>
  <polygon points="638,75 650,80 638,85" fill="#f97316"/>
  <text x="620" y="73" text-anchor="middle" fill="#fdba74" font-size="7">HTTPS</text>

  <!-- ── Node 5: Claude ── -->
  <rect x="650" y="50" width="55" height="60" rx="8" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="677" y="76" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold">Claude</text>
  <text x="677" y="89" text-anchor="middle" fill="#c4b5fd" font-size="7">vision API</text>
  <text x="677" y="100" text-anchor="middle" fill="#c4b5fd" font-size="7">structured</text>
  <text x="677" y="111" text-anchor="middle" fill="#c4b5fd" font-size="7">output</text>

  <!-- ── Output box ── -->
  <rect x="330" y="145" width="340" height="55" rx="8" fill="#1c1917" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="500" y="163" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">PageAnalysis response</text>
  <text x="500" y="178" text-anchor="middle" fill="#d6d3d1" font-size="8">is_paper_page · page_number · highlights (text + colour) · handwritten_notes</text>
  <text x="500" y="192" text-anchor="middle" fill="#d6d3d1" font-size="7">cached system prompt → fast + cheap on repeated frames</text>

  <!-- Arrow: Claude → output -->
  <line x1="677" y1="110" x2="677" y2="138" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="677" y1="138" x2="502" y2="138" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="497,133 485,138 497,143" fill="#a78bfa"/>

  <!-- Springs label -->
  <text x="75" y="140" text-anchor="middle" fill="#475569" font-size="8">springs keep paper</text>
  <text x="75" y="151" text-anchor="middle" fill="#475569" font-size="8">at constant height</text>

</svg>
